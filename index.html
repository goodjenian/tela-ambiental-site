    <!-- Structured Data: LocalBusiness / ProfessionalService -->

      "priceRange": "$$",

        "@type": "PostalAddress",
        "addressCountry": "BR"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Brasil"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Serviços de Licenciamento",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Licenciamento Ambiental e Urbanístico" } },
